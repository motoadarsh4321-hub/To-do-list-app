<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Add</button>
            </div>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="stats">
            <span class="stat-item">Total: <strong id="totalCount">0</strong></span>
            <span class="stat-item">Active: <strong id="activeCount">0</strong></span>
            <span class="stat-item">Completed: <strong id="completedCount">0</strong></span>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div id="emptyState" class="empty-state">
            <p>No tasks yet. Add one to get started!</p>
        </div>

        <footer class="footer">
            <button id="clearBtn" class="clear-btn">Clear Completed</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
